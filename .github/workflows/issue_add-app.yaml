name: "Issue Add APK Check"
permissions:
  issues: write
  contents: write
on:
  issues:
    types: [opened, edited]

jobs:
  verify:
    name: "执行验证流程并推送"
    runs-on: "ubuntu-latest"
    if: contains(github.event.issue.labels.*.name, 'app-submission')
    steps:
      - name: "Init Git"
        uses: "actions/checkout@v4"

      - name: "Init Issue"
        id: "issue-parser"
        uses: "stefanbuck/github-issue-parser@v3"
        with:
          template-path: ".github/ISSUE_TEMPLATE/add-app.yaml"
      - name: "Reply Get Issue"
        uses: "actions/github-script@v7"
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🤖 **系统消息**：已接收到你的申请，正在执行自动化检查（包名验证及清单构建），请稍后查看最终结果。"
            });
      - name: "Check Issue"
        uses: "actions/github-script@v7"
        with:
          script: |
            const parsedData = JSON.parse(`${{ steps.issue-parser.outputs.jsonString }}`);
            const source = parsedData.source;
            const value = (parsedData.value || "").trim();
            
            let errors = [];
            if (source === 'vivo' && !/^\d+$/.test(value)) {
                errors.push("vivo 来源的额外参数 填写数字");
            } else if (source === 'url' && !value.startsWith('https://')) {
                errors.push("url 来源的额外参数 以 https:// 开头");
            }

            if (errors.length > 0) {
                // 只有报错时才说话，引导用户修改
                const msg = `⚠️ 表单格式错误，请修正后重新提交：\n- ${errors.join('\n- ')}`;
                await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: msg
                });
                core.setFailed("Form validation failed");
            }

      # --- 这里放置你原有的 APK 分析步骤 ---
      - name: "Download APK"
        run: |
          # 点我展开
          SOURCE="${{ steps.issue-parser.outputs.issueparser_source }}"
          VALUE="${{ steps.issue-parser.outputs.issueparser_value }}"
          
          echo "文件来源 $SOURCE"
          case "$SOURCE" in
            vivo) dl_url="https://appstore.vivo.com.cn/appinfo/downloadApkFile-h5appstore?id=$VALUE" ;;
            apkpure) dl_url="https://d.apkpure.com/b/APK/$VALUE?version=latest" ;;
            *) dl_url="$VALUE" ;;
          esac
          aria2c --out "temp.apk" $dl_url
      - name: "Get APK Info"
        id: "apk-info"
        uses: "8Mi-Tech/get-apk-info-action@master"
        with:
          apkPath: "temp.apk"
      - name: "Check APK"
        run: |
          # 点我展开
          ISSUE="${{ steps.issue-parser.outputs.issueparser_package_id }}"
          FILE="${{ steps.apk-info.outputs.applicationId }}"
          if [ "$ISSUE" = "$FILE" ]; then
            echo "验证通过：包名匹配"
            exit 0
          else
            echo "验证失败：表单包名 ($ISSUE) 与 APK 实际包名 ($FILE) 不符"
            exit 1
          fi
      - name: "Write to Task List"
        run: |
          # 点我展开
          APP_NAME="${{ steps.issue-parser.outputs.issueparser_app_name }}"
          NICKNAME="${{ steps.issue-parser.outputs.issueparser_nickname }}"
          SOURCE="${{ steps.issue-parser.outputs.issueparser_source }}"
          VALUE="${{ steps.issue-parser.outputs.issueparser_value }}"

          case "$SOURCE" in
            "vivo")
              JSON_OBJ=$(jq -n --arg n "$NICKNAME" --arg v "$VALUE" '{nickname: $n, type: "direct", data: {source: "vivo", value: $v}}')
              SOURCE_NAME="vivo应用商店"
              ;;
            "apkpure")
              JSON_OBJ=$(jq -n --arg n "$NICKNAME" --arg v "$VALUE" '{nickname: $n, type: "direct", data: {source: "apkpure", value: $v, version: "latest"}}')
              SOURCE_NAME="APKPure"
              ;;
            "url")
              JSON_OBJ=$(jq -n --arg n "$NICKNAME" --arg v "$VALUE" '{nickname: $n, type: "direct", data: {source: "url", link: $v}}')
              SOURCE_NAME="N/A"
              ;;
            *)
              echo "Unknown source: $SOURCE"; exit 1
              ;;
          esac

          if [ ! -z "$JSON_OBJ" ]; then
            jq --argjson newitem "$JSON_OBJ" '.include += [$newitem]' task-list.json > temp.json
            mv temp.json task-list.json
            echo "✅ Successfully added $NICKNAME to task-list.json"
          fi

          echo "| $APP_NAME | $NICKNAME | $SOURCE_NAME | latest |" >> README.md

      - name: "Push"
        run: |
          # 点我展开
          APP_NAME="${{ steps.issue-parser.outputs.issueparser_app_name }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add task-list.json
          git add README.md
          git commit -m "auto: 添加新应用 $APP_NAME (via Issue #${{ github.event.issue.number }})"
          git push

      # --- 只有全部通过后，才发送最终回复 ---
      - name: "Success Reply"
        if: success()
        uses: "actions/github-script@v7"
        with:
          script: |
            // 发表成功评论
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🎉 **验证通过！** 应用已成功识别并加入处理队列，本工单将自动关闭。"
            });

            // 关闭 Issue (默认为 completed)
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
      - name: "Failure Reply"
        if: failure()
        uses: "actions/github-script@v7"
        with:
          script: |
            // 拼接当前 Workflow 运行页面的 URL
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            
            // 1. 发表失败评论，包含详情链接
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **验证失败！** 输入的信息与实际分析结果不符或格式错误。\n\n如需查看错误日志或详细信息，请点击此处：[查看 Workflow 详情](${runUrl})\n\n请检查后重新提交，本工单将以 [Not Planned] 状态关闭。`
            });

            // 2. 打上 invalid 标签
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['invalid']
            });

            // 3. 以 Not Planned 状态关闭 Issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });
